<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    /* ===== Reset & Base ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ===== Main Container ===== */
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
      color: #fff;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    /* ===== Heading ===== */
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 24px;
      color: #e0d7ff;
    }

    h1 span {
      font-size: 26px;
    }

    /* ===== Search Bar ===== */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    .search-bar input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    .search-bar input:focus {
      border-color: rgba(255, 255, 255, 0.55);
    }

    .search-bar button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #7c6fe0;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .search-bar button:hover {
      background: #6a5ed0;
    }

    .search-bar button:active {
      transform: scale(0.97);
    }

    /* ===== Error ===== */
    .error-msg {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid rgba(255, 80, 80, 0.4);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ffaaaa;
      margin-bottom: 18px;
      display: none;
    }

    /* ===== Weather Main Card ===== */
    .weather-card {
      display: none;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 24px 22px;
      margin-bottom: 16px;
    }

    .city-name {
      font-size: 26px;
      font-weight: 600;
      color: #fff;
    }

    .date-line {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      margin-bottom: 20px;
    }

    .main-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .temp-big {
      font-size: 60px;
      font-weight: 700;
      line-height: 1;
      color: #fff;
    }

    .condition {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 6px;
    }

    .weather-icon {
      font-size: 68px;
    }

    /* ===== Stats Grid ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 17px;
      font-weight: 600;
      color: #d0ccff;
    }

    /* ===== Forecast ===== */
    .forecast-section {
      display: none;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .forecast-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .forecast-item {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px 5px;
      text-align: center;
    }

    .forecast-day {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 6px;
    }

    .forecast-icon {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .forecast-temp {
      font-size: 13px;
      font-weight: 600;
      color: #c9c4ff;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
    }

    /* ===== Responsive ===== */
    @media (max-width: 400px) {
      .container {
        padding: 24px 18px;
      }
      .temp-big {
        font-size: 46px;
      }
      .weather-icon {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1><span>🌤️</span> Weather App</h1>

    <!-- Search -->
    <div class="search-bar">
      <input
        type="text"
        id="cityInput"
        placeholder="City likhein (e.g. Lahore, Dubai...)"
      />
      <button onclick="searchWeather()" title="Search">🔍</button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Main Weather Card -->
    <div class="weather-card" id="weatherCard">
      <div class="city-name" id="cityName"></div>
      <div class="date-line" id="dateLine"></div>
      <div class="main-row">
        <div>
          <div class="temp-big" id="tempBig"></div>
          <div class="condition" id="condition"></div>
        </div>
        <div class="weather-icon" id="weatherIcon"></div>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">💧 Humidity</div>
          <div class="stat-value" id="humidity">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">💨 Wind</div>
          <div class="stat-value" id="wind">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🌡️ Feels Like</div>
          <div class="stat-value" id="feelsLike">—</div>
        </div>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <div class="forecast-section" id="forecastSection">
      <div class="section-title">5-Day Forecast</div>
      <div class="forecast-row" id="forecastRow"></div>
    </div>

    <div class="footer">
      Supported: Lahore · Karachi · Islamabad · Peshawar · Multan · Quetta · London · Dubai · New York · Tokyo
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // ===== Weather Data =====
    const weatherData = {
      "lahore": {
        temp: 38, condition: "Sunny & Hot", icon: "☀️",
        humidity: "45%", wind: "12 km/h", feels: "41°C",
        forecast: [
          { d: "Mon", i: "☀️", t: "38°C" }, { d: "Tue", i: "⛅", t: "36°C" },
          { d: "Wed", i: "🌧️", t: "30°C" }, { d: "Thu", i: "⛅", t: "33°C" },
          { d: "Fri", i: "☀️", t: "37°C" }
        ]
      },
      "karachi": {
        temp: 33, condition: "Humid & Cloudy", icon: "⛅",
        humidity: "72%", wind: "18 km/h", feels: "37°C",
        forecast: [
          { d: "Mon", i: "⛅", t: "33°C" }, { d: "Tue", i: "🌧️", t: "29°C" },
          { d: "Wed", i: "🌩️", t: "27°C" }, { d: "Thu", i: "⛅", t: "31°C" },
          { d: "Fri", i: "⛅", t: "32°C" }
        ]
      },
      "islamabad": {
        temp: 29, condition: "Partly Cloudy", icon: "⛅",
        humidity: "60%", wind: "10 km/h", feels: "31°C",
        forecast: [
          { d: "Mon", i: "⛅", t: "29°C" }, { d: "Tue", i: "🌧️", t: "24°C" },
          { d: "Wed", i: "🌧️", t: "22°C" }, { d: "Thu", i: "☀️", t: "27°C" },
          { d: "Fri", i: "☀️", t: "30°C" }
        ]
      },
      "peshawar": {
        temp: 34, condition: "Clear Sky", icon: "☀️",
        humidity: "38%", wind: "8 km/h", feels: "36°C",
        forecast: [
          { d: "Mon", i: "☀️", t: "34°C" }, { d: "Tue", i: "☀️", t: "35°C" },
          { d: "Wed", i: "⛅", t: "31°C" }, { d: "Thu", i: "⛅", t: "30°C" },
          { d: "Fri", i: "☀️", t: "33°C" }
        ]
      },
      "multan": {
        temp: 40, condition: "Very Hot", icon: "🌡️",
        humidity: "35%", wind: "9 km/h", feels: "44°C",
        forecast: [
          { d: "Mon", i: "🌡️", t: "40°C" }, { d: "Tue", i: "☀️", t: "39°C" },
          { d: "Wed", i: "☀️", t: "41°C" }, { d: "Thu", i: "⛅", t: "36°C" },
          { d: "Fri", i: "☀️", t: "38°C" }
        ]
      },
      "quetta": {
        temp: 24, condition: "Clear & Dry", icon: "🌤️",
        humidity: "28%", wind: "15 km/h", feels: "23°C",
        forecast: [
          { d: "Mon", i: "🌤️", t: "24°C" }, { d: "Tue", i: "☀️", t: "26°C" },
          { d: "Wed", i: "⛅", t: "22°C" }, { d: "Thu", i: "☀️", t: "25°C" },
          { d: "Fri", i: "☀️", t: "27°C" }
        ]
      },
      "london": {
        temp: 17, condition: "Overcast", icon: "🌥️",
        humidity: "80%", wind: "22 km/h", feels: "15°C",
        forecast: [
          { d: "Mon", i: "🌥️", t: "17°C" }, { d: "Tue", i: "🌧️", t: "14°C" },
          { d: "Wed", i: "🌧️", t: "13°C" }, { d: "Thu", i: "⛅", t: "16°C" },
          { d: "Fri", i: "🌤️", t: "18°C" }
        ]
      },
      "dubai": {
        temp: 43, condition: "Extremely Hot", icon: "🌡️",
        humidity: "55%", wind: "14 km/h", feels: "48°C",
        forecast: [
          { d: "Mon", i: "☀️", t: "43°C" }, { d: "Tue", i: "☀️", t: "44°C" },
          { d: "Wed", i: "☀️", t: "42°C" }, { d: "Thu", i: "🌤️", t: "41°C" },
          { d: "Fri", i: "☀️", t: "43°C" }
        ]
      },
      "new york": {
        temp: 25, condition: "Partly Sunny", icon: "🌤️",
        humidity: "62%", wind: "16 km/h", feels: "26°C",
        forecast: [
          { d: "Mon", i: "🌤️", t: "25°C" }, { d: "Tue", i: "⛅", t: "22°C" },
          { d: "Wed", i: "🌧️", t: "19°C" }, { d: "Thu", i: "🌤️", t: "23°C" },
          { d: "Fri", i: "☀️", t: "26°C" }
        ]
      },
      "tokyo": {
        temp: 28, condition: "Humid & Sunny", icon: "☀️",
        humidity: "75%", wind: "11 km/h", feels: "32°C",
        forecast: [
          { d: "Mon", i: "☀️", t: "28°C" }, { d: "Tue", i: "⛅", t: "27°C" },
          { d: "Wed", i: "🌧️", t: "24°C" }, { d: "Thu", i: "🌤️", t: "26°C" },
          { d: "Fri", i: "☀️", t: "29°C" }
        ]
      }
    };

    // ===== Day Names =====
    function getDayName(offset) {
      const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return days[d.getDay()];
    }

    // ===== Search Function =====
    function searchWeather() {
      const input = document.getElementById("cityInput").value.trim().toLowerCase();
      const errEl = document.getElementById("errorMsg");
      const card = document.getElementById("weatherCard");
      const forecastSec = document.getElementById("forecastSection");

      // Reset
      errEl.style.display = "none";
      card.style.display = "none";
      forecastSec.style.display = "none";

      if (!input) {
        errEl.textContent = "⚠️ Pehle city ka naam likhein.";
        errEl.style.display = "block";
        return;
      }

      const data = weatherData[input];
      if (!data) {
        errEl.textContent = `❌ "${input}" nahi mila. Inhen try karein: Lahore, Karachi, Islamabad, Peshawar, Multan, Quetta, London, Dubai, New York, Tokyo`;
        errEl.style.display = "block";
        return;
      }

      // Date
      const now = new Date();
      const dateStr = now.toLocaleDateString("en-PK", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      });

      // Fill main card
      document.getElementById("cityName").textContent =
        input.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
      document.getElementById("dateLine").textContent = dateStr;
      document.getElementById("tempBig").textContent = data.temp + "°C";
      document.getElementById("condition").textContent = data.condition;
      document.getElementById("weatherIcon").textContent = data.icon;
      document.getElementById("humidity").textContent = data.humidity;
      document.getElementById("wind").textContent = data.wind;
      document.getElementById("feelsLike").textContent = data.feels;

      // Fill forecast
      const forecastRow = document.getElementById("forecastRow");
      forecastRow.innerHTML = "";
      data.forecast.forEach((f, i) => {
        const day = getDayName(i);
        forecastRow.innerHTML += `
          <div class="forecast-item">
            <div class="forecast-day">${day}</div>
            <div class="forecast-icon">${f.i}</div>
            <div class="forecast-temp">${f.t}</div>
          </div>`;
      });

      // Show
      card.style.display = "block";
      forecastSec.style.display = "block";
    }

    // Enter key support
    document.getElementById("cityInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") searchWeather();
    });

    // Auto-load Lahore on start
    document.getElementById("cityInput").value = "lahore";
    searchWeather();
  </script>

</body>
</html>
